; unifc configuration - ThinkPad T14s Gen 3 (Intel, i7-1270P)
;
; Single fan system. Uses standard ACPI EC protocol via PawnIO.
;
; NOTE: This is a 2022+ ThinkPad with BIOS Override Behavior. The EC
; firmware aggressively reasserts its own fan control after writes to
; register 0x2F. Fan speed changes may take 5+ seconds to take effect.
; This is a firmware limitation - no driver or software can fix it.
; Smart/Manual modes still work, but expect slower response times
; compared to older ThinkPads like the T480.
;
; Extended sensor registers (0xC0-0xC3) are omitted - they are
; repurposed in newer EC firmware and no longer reliable for
; temperature readings.
;
; To use: copy this file to unifc.ini in the executable directory,
; or pass the path as a command-line argument.

; ============================================================================
; Model Identity
; ============================================================================

Model=ThinkPad T14s Gen 3
Protocol=acpi_ec

; ============================================================================
; Register Map
; ============================================================================

FanControl=0x2F
FanSelector=0x00
BiosModeBit=7
BiosModeValue=0x80
FanRpmLo=0x84
FanRpmHi=0x85
NumFans=1

TempSensors=0x78,0x79,0x7A,0x7B,0x7C,0x7D,0x7E,0x7F
SensorNames=cpu,aps,crd,gpu,bat,x7d,bat,x7f

TempMin=10
TempMax=127

; ============================================================================
; Fan Control Settings
; ============================================================================

Active=2
Cycle=5
ManFanSpeed=0
ManModeExit=78
MaxReadErrors=10

; ============================================================================
; Fan Curve (Smart Mode)
; ============================================================================

; More aggressive than T480 curve - the 12th gen Alder Lake i7-1270P
; has higher thermal output under boost (P-cores up to 4.8 GHz).
Level=45 0 0 0
Level=55 2 0 0
Level=60 3 0 0
Level=65 4 2 0
Level=70 5 2 0
Level=78 6 0 0
Level=85 7 0 0
Level=-1 0

; ============================================================================
; Sensor Overrides
; ============================================================================

IgnoreSensors=aps
