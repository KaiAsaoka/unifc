; unifc configuration - ThinkPad T480 (dual-fan, NVIDIA MX150 dGPU)
;
; For the T480 with discrete NVIDIA MX150 GPU. Dual-fan system that
; requires the fan selector handshake (register 0x31) to control both
; CPU and GPU fans independently.
;
; If your T480 has integrated graphics only, use thinkpad_t480.ini instead.
;
; To use: copy this file to unifc.ini in the executable directory,
; or pass the path as a command-line argument.

; ============================================================================
; Model Identity
; ============================================================================

Model=ThinkPad T480 dGPU
Protocol=acpi_ec

; ============================================================================
; Register Map
; ============================================================================

FanControl=0x2F
FanSelector=0x31
BiosModeBit=7
BiosModeValue=0x80
FanRpmLo=0x84
FanRpmHi=0x85
NumFans=2

TempSensors=0x78,0x79,0x7A,0x7B,0x7C,0x7D,0x7E,0x7F,0xC0,0xC1,0xC2,0xC3
SensorNames=cpu,aps,crd,gpu,bat,x7d,bat,x7f,bus,pci,pwr,xc3

TempMin=10
TempMax=127

; ============================================================================
; Fan Control Settings
; ============================================================================

Active=2
Cycle=5
ManFanSpeed=0
ManModeExit=78
MaxReadErrors=10

; ============================================================================
; Fan Curve (Smart Mode)
; ============================================================================

Level=50 0 0 0
Level=55 2 0 0
Level=60 3 0 0
Level=65 4 2 0
Level=70 5 2 0
Level=75 6 0 0
Level=80 7 0 0
Level=-1 0

; ============================================================================
; Sensor Overrides
; ============================================================================

; GPU sensor (0x7B) returns 0x01 when dGPU is powered off (NVIDIA Optimus).
; This is filtered by TempMin=10. APS and PCI are noisy on T480.
IgnoreSensors=pci,aps
